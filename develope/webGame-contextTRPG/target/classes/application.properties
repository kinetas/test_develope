# ============================================================
#  webGame-contextTRPG — Application Configuration
#  Profile: default (development)
# ============================================================

# ----- Server -----
server.port=8080

# ----- H2 In-Memory Database (development) -----
spring.datasource.url=jdbc:h2:mem:trpgdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ----- JPA / Hibernate -----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----- Thymeleaf -----
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ----- JWT -----
# TODO: Replace with a strong secret (min 256-bit / 32 chars) before production
jwt.secret=REPLACE_ME_WITH_A_STRONG_SECRET_KEY_AT_LEAST_32_CHARS
jwt.expiration-ms=3600000

# ----- WebSocket -----
# STOMP endpoint and message broker prefix — configured in WebSocketConfig.java
# (no additional properties needed here by default)

# ----- File Upload -----
file.upload-dir=uploads/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ----- Logging -----
logging.level.com.trpg=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
